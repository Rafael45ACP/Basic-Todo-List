<!DOCTYPE html>
<html>
    <title>
        To Do List
    </title>

    <link rel="stylesheet" href="todo.css">

    <body>
        <span >Task:</span>
        <input id="taskInput">
        <span> Category: </span>
        <select id="sort">
            <option value="None">None</option>
            <option value="School">School</option>
            <option value="Personal">Personal</option>
            <option value="Gym">Gym</option>
        </select>
        <span> Deadline: </span>

        <input type="date" id="deadlineInput">
        
        <button id="DarkMode"> Dark Mode </button>
        
        <div> 
        <button id="addTask", type="submit"> Add Task</button>
        </div>
        
        <div id="filter">
            <span> Filter: </span>
        <label for="ALL"> All </label>
        <input id="ALL" type="radio" name="filter" checked>
        <label for="ACTIVE"> Active </label>
        <input id="ACTIVE" type="radio" name="filter">
        <label for="COMPLETED"> Completed </label>
        <input id="COMPLETED" type="radio" name="filter">

            <span> Category:</span>
             <select id="filterCategory">
                <option value="None">None</option>
                <option value="School">School</option>
                <option value="Personal">Personal</option>
                <option value="Gym">Gym</option>
            </select>
        </div>

      
        

        <div id="TaskNumber">
                <span id="totalCount">0</span> Total Tasks  /
                <span id="activeCount">0</span> Active Tasks  /
                <span id="completedCount">0</span> Completed Tasks
               
        </div>
        <div>
            <button id="clearCompleted"> Clear Completed Tasks </button>
        </div>

        <ul id="todo">

        </ul>

    </body>

    <script src="todo.js"></script>

</html>
